<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Knobs — ViT+LinearCP NM-ROM</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="experiments.css">
<script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";}document.documentElement.setAttribute("data-theme",t);})();</script>
<style>
  .tier-card { border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin:20px 0; background:var(--card); }
  .tier-card h2 { margin-top:0; }
  .tier-blurb { color:var(--muted); margin-bottom:18px; }
  .knob { border-top:1px dashed var(--border); padding:14px 0; }
  .knob:first-of-type { border-top:none; padding-top:0; }
  .knob-head { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  .knob-name { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:1.05em; font-weight:600; color:var(--accent); }
  .knob-loc { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.82em; color:var(--muted); }
  .knob-current { font-size:0.88em; color:var(--muted); }
  .knob-grid { display:grid; grid-template-columns: 140px 1fr; gap:4px 14px; margin-top:10px; font-size:0.93em; }
  .knob-grid dt { font-weight:600; color:var(--muted); }
  .knob-grid dd { margin:0; }
  .lever-tag { display:inline-block; padding:2px 8px; border-radius:10px; background:var(--accent); color:white; font-size:0.75em; font-weight:600; margin-left:8px; }
  .exp-card { border:1px solid var(--border); border-radius:10px; padding:18px 22px; margin:14px 0; background:var(--card); }
  .exp-card h3 { margin-top:0; }
  .exp-grid { display:grid; grid-template-columns: 120px 1fr; gap:6px 14px; margin-top:10px; font-size:0.93em; }
  .exp-grid dt { font-weight:600; color:var(--muted); }
  .exp-grid dd { margin:0; }
  .mvp { background:var(--accent); color:white; padding:12px 16px; border-radius:8px; margin-top:18px; font-weight:500; }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="theme-toggles">
      <button id="theme-btn" class="theme-btn" title="Toggle page dark mode">🌙 Dark</button>
    </div>
    <p class="breadcrumb"><a href="index.html">← Reading room</a> · <a href="experiments.html">Experiments walkthrough</a></p>
    <h1 id="page-title">The knobs</h1>
    <p id="page-intro" class="tag"></p>
    <p id="how-to-read" class="how"></p>
  </div>
</header>

<main class="wrap">
  <section id="tiers"></section>
  <section id="demonstration"></section>
</main>

<footer><div class="wrap"><p><a href="index.html">← Back to reading room</a> · <a href="experiments.html">Experiments →</a></p></div></footer>

</body>
</html>
