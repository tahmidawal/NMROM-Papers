<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>What Experiments Do Other NM-ROM Papers Run?</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="experiments.css">
<script>(function(){var t=localStorage.getItem("theme");if(!t){t=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";}document.documentElement.setAttribute("data-theme",t);var p=localStorage.getItem("pdfDark")==="1";if(p)document.addEventListener("DOMContentLoaded",function(){document.body.classList.add("pdf-dark");});})();</script>
</head>
<body>
<header>
  <div class="wrap">
    <div class="theme-toggles">
      <button id="theme-btn" class="theme-btn" title="Toggle page dark mode">🌙 Dark</button>
      <button id="pdf-dark-btn" class="theme-btn" title="Toggle PDF dark mode">📄 PDF dark</button>
    </div>
    <p class="breadcrumb"><a href="index.html">← Reading room</a></p>
    <h1 id="page-title">What experiments do other NM-ROM papers run?</h1>
    <p id="page-intro" class="tag"></p>
    <p id="how-to-read" class="how"></p>
  </div>
</header>

<main class="wrap experiments-main">
  <nav id="paper-nav"></nav>
  <section id="paper-column">
    <section id="paper-list"></section>
    <section id="takeaways"></section>
  </section>
  <aside id="pdf-pane" class="pdf-empty">
    <div class="pdf-pane-head">
      <span id="pdf-pane-title">PDF viewer</span>
      <div class="pdf-pane-actions">
        <a id="pdf-open-new" href="#" target="_blank" rel="noopener" title="Open in new tab">↗</a>
        <button id="pdf-close" title="Close">×</button>
      </div>
    </div>
    <div id="pdf-empty-msg">Click <strong>Open PDF</strong> on any paper card to read it here.</div>
    <iframe id="pdf-frame" title="PDF"></iframe>
  </aside>
</main>

<footer><div class="wrap"><p><a href="index.html">← Back to reading room</a> · <a href="https://github.com/tahmidawal/NMROM-Papers">GitHub</a></p></div></footer>

<script src="theme.js"></script>
<script src="experiments.js"></script>
</body>
</html>
